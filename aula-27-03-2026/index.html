<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Funções</h1>
    <h2>Calculadora de Abastecimento</h2>
    <p>Tipo de combustível</p>
    <ul>
        <li>Gasolina: R$ 6.79</li>
        <li>Etanol: R$ 5.40</li>
        <li>Diesel: R$ 6.20</li>
    </ul>
    <form id="formularioCombustivel">
        <label for="">Tipo Combustível</label>
        <select name="combustivel" id="combustivel">
            <option value="">Escolha uma opção</option>
            <option value="gasolina">Gasolina</option>
            <option value="etanol">Etanol</option>
            <option value="diesel">Diesel</option>
        </select>
        <label for="">Quantidade de litros</label>
        <input type="number" step="0.1" min="0" id="litros">
    </form>
    <h2>Resultado</h2>
    <p id="resultado"></p>
    <script src="script.js"></script>
</body>
</html>
